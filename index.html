<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen Float</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "brand-gold": "#D4AF37",
              "brand-magenta": "#B33C86",
              "brand-blue": "#3B82F6",
              "spa-beige": "#EFEBE4",
              "spa-dark": "#121212",
              "spa-aqua": "#0A3A40",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ['"Playfair Display"', "serif"],
            },
          },
        },
      };
    </script>
    <style>
      /* Hide default summary markers for custom accordion UI */
      details > summary {
        list-style: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
    </style>
  </head>
  <body class="font-sans antialiased text-spa-beige bg-spa-dark">
    <section id="services" class="py-24 md:py-32 text-white">
      <div class="max-w-7xl mx-auto px-6">
        <div class="text-center mb-20">
          <h2 class="text-4xl md:text-5xl font-serif mb-4">Themes</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <a
            href="first.html"
            class="bg-spa-beige text-spa-dark p-10 rounded-sm shadow-xl hover:-translate-y-3 transition-all duration-500 border border-transparent hover:border-brand-gold group flex flex-col justify-between h-full"
          >
            <div>
              <h3
                class="text-2xl font-serif mb-4 group-hover:text-brand-magenta transition-colors duration-300"
              >
                First one
              </h3>
            </div>
          </a>

          <a
            href="second.html"
            class="bg-spa-beige text-spa-dark p-10 rounded-sm shadow-xl hover:-translate-y-3 transition-all duration-500 border border-transparent hover:border-brand-gold group flex flex-col justify-between h-full"
          >
            <div>
              <h3
                class="text-2xl font-serif mb-4 group-hover:text-brand-magenta transition-colors duration-300"
              >
                Second one
              </h3>
            </div>
          </a>

          <a
            href="third.html"
            class="bg-spa-beige text-spa-dark p-10 rounded-sm shadow-xl hover:-translate-y-3 transition-all duration-500 border border-transparent hover:border-brand-gold group flex flex-col justify-between h-full"
          >
            <div>
              <h3
                class="text-2xl font-serif mb-4 group-hover:text-brand-magenta transition-colors duration-300"
              >
                Third one
              </h3>
            </div>
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
